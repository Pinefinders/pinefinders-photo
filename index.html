<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinefinders Photo Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, 'Times New Roman', serif; background: #f5f0ea; color: #2c2c2c; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 1.8rem; font-weight: normal; letter-spacing: 0.05em; color: #3a2e1e; }
    header p { font-size: 0.9rem; color: #7a6a55; margin-top: 6px; font-style: italic; }
    .card { background: #fff; border: 1px solid #ddd5c8; border-radius: 4px; padding: 32px; width: 100%; max-width: 640px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .upload-zone { border: 2px dashed #c8bfb0; border-radius: 4px; padding: 36px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: #8b6f47; background: #faf7f3; }
    .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }
    .upload-zone p { color: #7a6a55; font-size: 0.95rem; }
    .upload-zone .file-name { margin-top: 8px; font-size: 0.85rem; color: #3a2e1e; font-style: normal; }
    #preview-section { display: none; margin-top: 20px; }
    #preview-section img { width: 100%; border-radius: 4px; border: 1px solid #ddd5c8; }
    #generate-btn { display: none; width: 100%; margin-top: 20px; padding: 14px; background: #3a2e1e; color: #f5f0ea; font-family: Georgia, serif; font-size: 1rem; letter-spacing: 0.06em; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    #generate-btn:hover:not(:disabled) { background: #5c4a2e; }
    #generate-btn:disabled { background: #b0a898; cursor: not-allowed; }
    #status { display: none; margin-top: 16px; text-align: center; font-size: 0.9rem; color: #7a6a55; font-style: italic; }
    #result-section { display: none; margin-top: 28px; }
    #result-section h2 { font-size: 0.8rem; font-weight: normal; color: #7a6a55; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    #result-section img { width: 100%; border-radius: 4px; border: 1px solid #ddd5c8; }
    #download-btn { display: inline-block; margin-top: 14px; padding: 10px 24px; background: transparent; border: 1px solid #3a2e1e; color: #3a2e1e; font-family: Georgia, serif; font-size: 0.9rem; letter-spacing: 0.05em; border-radius: 4px; cursor: pointer; text-decoration: none; transition: background 0.2s, color 0.2s; }
    #download-btn:hover { background: #3a2e1e; color: #f5f0ea; }
    #error-msg { display: none; margin-top: 16px; padding: 12px 16px; background: #fdf0f0; border: 1px solid #e8c0c0; border-radius: 4px; color: #8b2020; font-size: 0.88rem; }
  </style>
</head>
<body>
  <header>
    <h1>Pinefinders Photo Tool</h1>
    <p>Place furniture in the showroom</p>
  </header>
  <div class="card">
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="photo-input" accept="image/*" />
      <span class="upload-icon">📷</span>
      <p>Click or drag a photo here</p>
      <p class="file-name" id="file-name"></p>
    </div>
    <div id="preview-section">
      <img id="preview-img" src="" alt="Preview" />
    </div>
    <button id="generate-btn">Place in Showroom</button>
    <div id="status">Sending to Gemini…</div>
    <div id="error-msg"></div>
    <div id="result-section">
      <h2>Result</h2>
      <img id="result-img" src="" alt="Result" />
      <br />
      <a id="download-btn" download="pinefinders-showroom.jpg">Download Image</a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
